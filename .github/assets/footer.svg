<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 160" width="1280" height="160">
  <defs>
    <style>
      @keyframes pulse-led {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes blink-cursor {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      text, tspan {
        font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace;
      }
    </style>
    <pattern id="scanlines-f" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="white" opacity="0.15"/>
    </pattern>
    <radialGradient id="vignette-f" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="phosphor-f">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Outer bezel -->
  <rect x="0" y="0" width="1280" height="160" rx="12" ry="12" fill="#111118" stroke="#2a2833" stroke-width="1.5"/>
  <!-- Inner bezel -->
  <rect x="8" y="8" width="1264" height="144" rx="8" ry="8" fill="#18181f"/>
  <!-- Screen -->
  <rect x="16" y="16" width="1248" height="120" rx="4" ry="4" fill="#08060d"/>
  <!-- Scanlines -->
  <rect x="16" y="16" width="1248" height="120" rx="4" ry="4" fill="url(#scanlines-f)"/>
  <!-- Vignette -->
  <rect x="16" y="16" width="1248" height="120" rx="4" ry="4" fill="url(#vignette-f)"/>

  <!-- Tagline -->
  <text x="640" y="58" text-anchor="middle" fill="#00ffb3" font-size="14" filter="url(#phosphor-f)" opacity="0.9">open protocols for an open network.</text>

  <!-- Status line -->
  <text x="640" y="82" text-anchor="middle" fill="#b0aec0" font-size="12" filter="url(#phosphor-f)">relay: MCP handshake complete</text>

  <!-- Node type -->
  <text x="640" y="106" text-anchor="middle" fill="#a09eb0" font-size="10" letter-spacing="4">RELAY_NODE</text>

  <!-- Bezel labels -->
  <text x="30" y="153" font-size="8" fill="#4a4859">ITASHA.CORP</text>
  <text x="1220" y="153" text-anchor="end" font-size="8" fill="#4a4859">CRT-S4F3</text>

  <!-- Power LED -->
  <circle cx="1240" cy="148" r="3.5" fill="#01fe36" opacity="0.8"/>
  <circle cx="1240" cy="148" r="2" fill="#01fe36" opacity="1.0"/>
</svg>