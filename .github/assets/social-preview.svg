          <line x1="50.2" y1="-29" x2="46.8" y2="-27"/><line x1="58" y1="0" x2="54" y2="0"/>
          <line x1="50.2" y1="29" x2="46.8" y2="27"/><line x1="29" y1="50.2" x2="27" y2="46.8"/>
