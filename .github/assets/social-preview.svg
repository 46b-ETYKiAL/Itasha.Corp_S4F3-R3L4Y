<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffb3" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1280" height="4">
      <rect width="1280" height="2" fill="white" opacity="0.06"/>
    </pattern>
    <filter id="accent-glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="name-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes glowPulse { 0%,100% { filter:url(#name-glow); opacity:1; } 50% { filter:url(#accent-glow); opacity:0.92; } }
    @keyframes barGlow { 0%,100% { opacity:0.15; } 50% { opacity:0.35; } }
    @media (prefers-reduced-motion: reduce) {
      .glow-name, .bar-glow { animation: none; }
    }
  </style>
  <rect width="1280" height="640" fill="#0e0c15"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#scanlines)"/>
  <rect width="1280" height="640" fill="url(#vignette)"/>

  <!-- Circuit trace background -->
  <path d="M 850,80 L 850,180 L 950,180 L 950,280 L 850,280 L 850,380 L 1000,380 L 1000,200 L 1100,200 L 1100,120 L 950,120" fill="none" stroke="#00ffb3" stroke-width="0.8" opacity="0.04"/>

  <rect y="632" width="1280" height="8" fill="#00ffb3"/>
  <text x="640" y="160" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#7a7a8a" letter-spacing="6">ITASHA.CORP</text>

  <!-- Name with glow-pulse -->
  <text class="glow-name" x="640" y="280" text-anchor="middle" font-family="'Courier New',monospace" font-size="36" font-weight="bold" fill="#00ffb3" style="animation: glowPulse 4s ease-in-out infinite;">[ S4F3-R3L4Y ]</text>

  <text x="640" y="330" text-anchor="middle" font-family="'Courier New',monospace" font-size="17" fill="#9a9aaa">Open-source MCP servers</text>

  <!-- Graphic: relay signal bouncing between nodes (scaled up) -->
  <g transform="translate(640,440) scale(1.4) translate(-640,-440)">
    <circle cx="520" cy="440" r="10" fill="none" stroke="#00ffb3" stroke-width="2" opacity="0.75"/>
    <circle cx="520" cy="440" r="3" fill="#00ffb3" opacity="0.75"/>
    <line x1="530" y1="440" x2="620" y2="420" stroke="#00ffb3" stroke-width="1.5" opacity="0.65"/>
    <circle cx="630" cy="418" r="8" fill="none" stroke="#00ffb3" stroke-width="1.5" opacity="0.65"/>
    <circle cx="630" cy="418" r="3" fill="#00ffb3" opacity="0.65"/>
    <line x1="638" y1="420" x2="700" y2="450" stroke="#00ffb3" stroke-width="1.5" opacity="0.55"/>
    <circle cx="710" cy="453" r="8" fill="none" stroke="#00ffb3" stroke-width="1.5" opacity="0.55"/>
    <circle cx="710" cy="453" r="3" fill="#00ffb3" opacity="0.55"/>
    <line x1="718" y1="450" x2="770" y2="430" stroke="#00ffb3" stroke-width="1.5" opacity="0.45"/>
    <circle cx="778" cy="428" r="6" fill="none" stroke="#00ffb3" stroke-width="1" opacity="0.45"/>
    <circle cx="778" cy="428" r="2" fill="#00ffb3" opacity="0.45"/>
  </g>

  <!-- Stat labels -->
  <text x="400" y="570" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#5a5869" letter-spacing="2">Python / Node.js</text>
  <text x="640" y="570" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#5a5869" letter-spacing="2">Apache 2.0</text>
  <text x="880" y="570" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#5a5869" letter-spacing="2">RELAY_NODE</text>

  <!-- Corner brackets -->
  <path d="M 40,40 L 40,80 M 40,40 L 80,40" stroke="#00ffb3" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 1240,40 L 1240,80 M 1240,40 L 1200,40" stroke="#00ffb3" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 40,600 L 40,560 M 40,600 L 80,600" stroke="#00ffb3" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 1240,600 L 1240,560 M 1240,600 L 1200,600" stroke="#00ffb3" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Divider -->
  <line x1="440" y1="345" x2="840" y2="345" stroke="#00ffb3" stroke-width="0.5" opacity="0.4"/>
  <!-- Built by -->
  <text x="640" y="595" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#7a7889">Built by Itasha Corp</text>
  <!-- Accent bar glow -->
  <rect class="bar-glow" y="632" width="1280" height="4" fill="#00ffb3" style="animation: barGlow 3s ease-in-out infinite;" filter="url(#accent-glow)"/>
</svg>