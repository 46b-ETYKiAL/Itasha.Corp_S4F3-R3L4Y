<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 548" width="1280" height="548">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes sweep { 0% { transform: translateY(0); } 100% { transform: translateY(500px); } }
    @keyframes flicker { 0%,96%,100% { opacity: 1; } 97% { opacity: 0.97; } 98% { opacity: 0.99; } }
    @keyframes arcBroadcast { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }
    @keyframes signalBroadcast { 0% { opacity: 0.8; stroke-dashoffset: 20; } 100% { opacity: 0.2; stroke-dashoffset: 0; } }
    @keyframes endpointBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.3; } }
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace; }
    @keyframes bootReveal { 0% { opacity: 0; } 100% { opacity: 0.9; } }
    @keyframes heartbeat { 0%,100% { r: 3; opacity: 0.5; } 15% { r: 4; opacity: 0.9; } 30% { r: 3; opacity: 0.5; } 45% { r: 3.5; opacity: 0.8; } 60% { r: 3; opacity: 0.5; } }
    @keyframes edgeGlow { 0% { stroke-dashoffset: 3500; } 100% { stroke-dashoffset: 0; } }
    @keyframes phosphorBloom { 0%,100% { opacity: 0; } 50% { opacity: 0.015; } }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>

  <!-- Outer bezel -->
  <rect x="0" y="0" width="1280" height="548" rx="18" ry="18" fill="#111118" stroke="#2a2833" stroke-width="2"/>
  <!-- Inner bezel -->
  <rect x="12" y="12" width="1256" height="524" rx="12" ry="12" fill="#18181f"/>
  <!-- Screen -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="#08060d"/>
  <!-- Scanlines -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="url(#scanlines)"/>
  <!-- Vignette -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="url(#vignette)"/>


  <!-- Edge glow -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="none" stroke="#00ffb3" stroke-width="1" opacity="0.06" stroke-dasharray="20,3480" style="animation: edgeGlow 12s linear infinite;"/>
  <!-- Scanline sweep -->
  <rect x="24" y="24" width="1232" height="2" fill="#00ffb3" opacity="0.03" style="animation: sweep 10s linear infinite;"/>


  <!-- Phosphor bloom -->
  <rect x="24" y="24" width="1232" height="500" rx="6" ry="6" fill="white" opacity="0" style="animation: phosphorBloom 8s ease-in-out infinite;"/>
  <!-- Main content with flicker -->
  <g style="animation: flicker 6s infinite;">
    <!-- Header text -->
    <text x="640" y="80" text-anchor="middle" fill="#5a5869" font-size="11" letter-spacing="6" filter="url(#phosphor)">I T A S H A . C O R P</text>

    <!-- Repo name -->
    <text x="640" y="130" text-anchor="middle" fill="#00ffb3" font-size="22" font-weight="bold" letter-spacing="4" filter="url(#glow)">[ S 4 F 3 : R 3 L 4 Y ]</text>

    <!-- Boot sequence -->
    <g fill="#00ffb3" font-size="12" filter="url(#phosphor)" opacity="0.9">
      <text x="60" y="190">relay.init ──────────────────────</text>
      <text x="60" y="220" style="animation: bootReveal 0.3s ease-out 0.2s both;">&gt; mcp.protocol.bind()</text>
      <text x="500" y="220" fill="#01fe36">[ OK ]</text>
      <text x="60" y="248" style="animation: bootReveal 0.3s ease-out 0.5s both;">&gt; github.native.connect()</text>
      <text x="500" y="248" fill="#01fe36">[ OK ]</text>
      <text x="60" y="276" style="animation: bootReveal 0.3s ease-out 0.8s both;">&gt; comfyui.bridge.ready()</text>
      <text x="500" y="276" fill="#01fe36">[ OK ]</text>
      <text x="60" y="304" style="animation: bootReveal 0.3s ease-out 1.1s both;">&gt; tools.register(36)</text>
      <text x="500" y="304" fill="#01fe36">[ OK ]</text>
      <text x="60" y="332" style="animation: bootReveal 0.3s ease-out 1.4s both;">&gt; relay.broadcast.open()</text>
      <text x="500" y="332" fill="#01fe36">[ OK ]</text>
      <text x="60" y="360">───────────────────────────────────</text>
      <text x="60" y="400">relay</text>
      <text x="200" y="400">.......................</text>
      <text x="430" y="400" fill="#00ffb3" font-weight="bold">[ 0P3N S0URC3 ]</text>
    </g>

    <!-- Unique element: Relay antenna tower -->
    <g transform="translate(820, 190)">
      <!-- Main antenna trunk -->
      <line x1="60" y1="0" x2="60" y2="220" stroke="#00ffb3" stroke-width="2.5" filter="url(#glow)"/>
      <!-- Antenna top cap -->
      <circle cx="60" cy="0" r="4" fill="#00ffb3" opacity="0.9" filter="url(#glow)"/>
      <!-- Top crossbar / dish -->
      <line x1="45" y1="8" x2="75" y2="8" stroke="#00ffb3" stroke-width="1.5"/>

      <!-- Branch 1 (top) -->
      <line x1="60" y1="40" x2="200" y2="40" stroke="#00ffb3" stroke-width="1.5" opacity="0.9" stroke-dasharray="6,3" style="animation: signalBroadcast 1.5s linear infinite;"/>
      <circle cx="200" cy="40" r="5" fill="none" stroke="#00ffb3" stroke-width="1.5" style="animation: endpointBlink 2s ease-in-out infinite;"/>
      <circle cx="200" cy="40" r="2" fill="#00ffb3" style="animation: endpointBlink 2s ease-in-out infinite;"/>
      <text x="210" y="44" fill="#5a5869" font-size="9" opacity="0.7">MCP</text>

      <!-- Branch 2 (middle) -->
      <line x1="60" y1="90" x2="180" y2="90" stroke="#00ffb3" stroke-width="1.5" opacity="0.6" stroke-dasharray="6,3" style="animation: signalBroadcast 2s linear infinite;"/>
      <circle cx="180" cy="90" r="5" fill="none" stroke="#00ffb3" stroke-width="1.5" style="animation: endpointBlink 2s ease-in-out 0.4s infinite;"/>
      <circle cx="180" cy="90" r="2" fill="#00ffb3" style="animation: endpointBlink 2s ease-in-out 0.4s infinite;"/>
      <text x="190" y="94" fill="#5a5869" font-size="9" opacity="0.7">GH</text>

      <!-- Branch 3 (bottom) -->
      <line x1="60" y1="140" x2="160" y2="140" stroke="#00ffb3" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3" style="animation: signalBroadcast 2.5s linear infinite;"/>
      <circle cx="160" cy="140" r="5" fill="none" stroke="#00ffb3" stroke-width="1.5" style="animation: endpointBlink 2s ease-in-out 0.8s infinite;"/>
      <circle cx="160" cy="140" r="2" fill="#00ffb3" style="animation: endpointBlink 2s ease-in-out 0.8s infinite;"/>
      <text x="170" y="144" fill="#5a5869" font-size="9" opacity="0.7">CMFY</text>

      <!-- Signal arcs from antenna top -->
      <path d="M 70 -5 Q 80 -15 70 -25" fill="none" stroke="#00ffb3" stroke-width="1" style="animation: arcBroadcast 2s ease-in-out infinite;"/>
      <path d="M 75 -5 Q 90 -20 75 -35" fill="none" stroke="#00ffb3" stroke-width="1" style="animation: arcBroadcast 2s ease-in-out 0.3s infinite;"/>

      <!-- Apache 2.0 label -->
      <text x="45" y="218" fill="#5a5869" font-size="8" text-anchor="middle">Apache 2.0</text>
    </g>
  </g>

  <!-- Corner brackets -->
  <path d="M 40,40 L 40,70 M 40,40 L 70,40" stroke="#00ffb3" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1240,40 L 1240,70 M 1240,40 L 1210,40" stroke="#00ffb3" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 40,510 L 40,480 M 40,510 L 70,510" stroke="#00ffb3" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M 1240,510 L 1240,480 M 1240,510 L 1210,510" stroke="#00ffb3" stroke-width="1.5" fill="none" opacity="0.1"/>

  <!-- Ambient accent lines -->
  <line x1="24" y1="200" x2="1256" y2="200" stroke="#00ffb3" stroke-width="0.5" opacity="0.04"/>
  <line x1="24" y1="350" x2="1256" y2="350" stroke="#00ffb3" stroke-width="0.5" opacity="0.03"/>

  <!-- Status indicator dots -->
  <circle cx="50" cy="505" r="3" fill="#01fe36" opacity="0.5" style="animation: heartbeat 2s ease-in-out infinite;"/>
  <circle cx="62" cy="505" r="3" fill="#00ffb3" opacity="0.4"/>
  <circle cx="74" cy="505" r="3" fill="#5a5869" opacity="0.3"/>

  <!-- Bezel detail lines -->
  <line x1="30" y1="14" x2="1250" y2="14" stroke="#2a2833" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="536" x2="1250" y2="536" stroke="#2a2833" stroke-width="0.5" opacity="0.3"/>

  <!-- Bezel labels -->
  <text x="40" y="542" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#4a4859" letter-spacing="2">ITASHA.CORP</text>
  <text x="1200" y="542" text-anchor="end" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="9" fill="#4a4859">CRT-S4F3</text>

  <!-- Power LED -->
  <circle cx="1232" cy="534" r="6" fill="#01fe36" opacity="0.3"/>
  <circle cx="1232" cy="534" r="4" fill="#01fe36" opacity="1.0"/>
</svg>